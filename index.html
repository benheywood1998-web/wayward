<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wayward</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

*{
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:#0f1115;
  color:white;
  text-align:center;
  margin:0;
  padding:24px 16px 50px;
}

h1{
  font-size:44px;
  font-weight:800;
  margin:0;
  letter-spacing:-2px;
}

.subtitle{
  margin-top:8px;
  margin-bottom:28px;
  color:#9aa4b2;
  font-size:12px;
}

button{
  background:white;
  color:black;
  border:none;
  border-radius:16px;
  padding:14px 26px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

.card{
  max-width:720px;
  margin:24px auto 15px;
  border-radius:28px;
  padding:28px 22px;
  min-height:320px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* Card colors */
.group{
  background:#7c3aed;
}

.individual{
  background:#0f766e;
}

.secret{
  background:#ea580c;
}

/* NEW: card type section */
.card-top{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  margin-bottom:18px;
}

.type{
  font-size:14px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.95;
  background:rgba(0,0,0,0.25);
  padding:6px 12px;
  border-radius:999px;
}

.instructions{
  font-size:13px;
  opacity:0.85;
  max-width:90%;
  line-height:1.4;
}

/* divider for clarity */
.divider{
  width:60%;
  height:1px;
  background:rgba(255,255,255,0.25);
  margin:10px auto 0;
}

/* Task emphasis */
.task{
  font-size:36px;
  font-weight:900;
  line-height:1.2;
  margin-top:18px;
  padding-top:18px;
}

.placeholder{
  color:#d1d5db;
  font-size:28px;
  font-weight:700;
}

#remaining{
  font-size:13px;
  color:#8b949e;
  margin-top:10px;
}

/* Mobile tweaks */
@media (max-width:600px){

  h1{
    font-size:36px;
  }

  .task{
    font-size:28px;
  }

  .card{
    padding:22px 16px;
    min-height:280px;
  }

  button{
    width:100%;
  }

}

</style>
</head>

<body>

<h1>Wayward</h1>

<p class="subtitle">
A silly game for silly people and Ben.
</p>

<button onclick="drawCard()">
Draw Card
</button>

<div id="card" class="card">

  <div class="card-top">

    <div id="type" class="type"></div>

    <div id="instructions" class="instructions"></div>

    <div class="divider"></div>

  </div>

  <div id="task" class="task placeholder">
    Press Draw Card
  </div>

</div>

<div id="remaining">
Loading cards...
</div>

<script>

let cards = [];
let remainingCards = [];

const API_URL = "https://script.google.com/macros/s/AKfycbyChplToswSaLr6B4te3228by7JS-7Ek9DOMri7Bl9c0SVbRyyhVjG_KZLpXjH0aSpc/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {

    cards = data;
    remainingCards = [...cards];

    updateRemainingCount();

  })
  .catch(error => {

    console.error(error);

    document.getElementById("remaining").innerText =
      "Failed to load cards";

  });

function updateRemainingCount() {

  document.getElementById("remaining").innerText =
    remainingCards.length + " cards remaining";

}

function drawCard() {

  if (remainingCards.length === 0) {

    alert("Deck complete! Reshuffling...");

    remainingCards = [...cards];

  }

  const randomIndex =
    Math.floor(Math.random() * remainingCards.length);

  const card =
    remainingCards.splice(randomIndex, 1)[0];

  const cardElement =
    document.getElementById("card");

  cardElement.classList.remove(
    "group",
    "individual",
    "secret"
  );

  const type =
    card.type.toLowerCase();

  if (type.includes("group")) {

    cardElement.classList.add("group");

    document.getElementById("type").innerText =
      "GANG RULE";

    document.getElementById("instructions").innerText =
      "Read this out loud. Everyone in the group must complete this task";

  }

  else if (type.includes("secret")) {

    cardElement.classList.add("secret");

    document.getElementById("type").innerText =
      "SIDE QUEST";

    document.getElementById("instructions").innerText =
      "Keep this to yourself. Complete this task whenever you feel the time is right";

  }

  else {

    cardElement.classList.add("individual");

    document.getElementById("type").innerText =
      "SOLO MISSION";

    document.getElementById("instructions").innerText =
      "Read this out loud. Only the reader must complete this task";

  }

  document.getElementById("task").innerText =
    card.task;

  document.getElementById("task").classList.remove(
    "placeholder"
  );

  updateRemainingCount();

}

</script>

</body>
</html>
