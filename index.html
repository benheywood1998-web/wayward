<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Party Cards</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:30px;
  background:#111;
  color:white;
}

.card{
  margin-top:30px;
  padding:30px;
  border-radius:20px;
  background:#222;
  min-height:200px;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
}

.type{
  font-size:30px;
  margin-bottom:20px;
  font-weight:bold;
}

.task{
  font-size:24px;
}

</style>
</head>

<body>

<h1>Party Cards</h1>

<button onclick="drawCard()">
Draw Card
</button>

<div class="card">

<div id="type" class="type"></div>

<div id="task" class="task">
Press Draw Card
</div>

</div>

<script>

let cards = [];

const API_URL =
"https://https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQyGtW7WQRJ0zwsaMPNbEvBkkKPqvkZK1Hag6393Pxwbl44-oka9tuwaKKuQXNiRlHhZSR6-RRUylAq53wp8gRD5UR4irHA3I04GRKSz30LK6n7wZMim3emA0nx2N4nIuza-TbacPckpDKJSIO854fh3nUIT2qDLVCOBxyHA4leSGOwbjrbrEBKmV_kf5HoveVtdIIH6moFD5sv5wFy22iPLbnAtolKt5JatvOWPtX6Y-WB_FaSIc2eq8FU-yYQbg9YzvxP7VKOPsASb80399GKYnIOnw&lib=MHq7dbp8_QuinNrlo3chNj_E9M74BN09Y";

fetch(API_URL)
  .then(r => r.json())
  .then(data => {
      cards = data;
  });

function drawCard(){

  if(cards.length === 0){
    return;
  }

  const random =
    cards[Math.floor(Math.random()*cards.length)];

  document.getElementById("type")
    .innerText = random.type;

  document.getElementById("task")
    .innerText = random.task;
}

</script>

</body>
</html>
