<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Party Cards</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:30px;
  background:#111;
  color:white;
}

.card{
  margin-top:30px;
  padding:30px;
  border-radius:20px;
  background:#222;
  min-height:200px;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
}

.type{
  font-size:30px;
  margin-bottom:20px;
  font-weight:bold;
}

.task{
  font-size:24px;
}

</style>
</head>

<body>

<h1>Party Cards</h1>

<button onclick="drawCard()">
Draw Card
</button>

<div class="card">

<div id="type" class="type"></div>

<div id="task" class="task">
Press Draw Card
</div>

</div>

<script>

let cards = [];

const API_URL = "https://script.google.com/macros/s/AKfycbyChplToswSaLr6B4te3228by7JS-7Ek9DOMri7Bl9c0SVbRyyhVjG_KZLpXjH0aSpc/exec";

fetch(API_URL)
  .then(r => r.json())
  .then(data => {
      cards = data;
  });

function drawCard(){

  if(cards.length === 0){
    return;
  }

  const random =
    cards[Math.floor(Math.random()*cards.length)];

  document.getElementById("type")
    .innerText = random.type;

  document.getElementById("task")
    .innerText = random.task;
}

</script>

</body>
</html>
