<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Wayward</title>

<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  padding:30px;
  background:#111;
  color:white;
  max-width:800px;
  margin:auto;
}

h1{
  margin-bottom:10px;
}

.subtitle{
  margin-top:0;
  margin-bottom:30px;
  opacity:0.8;
  font-style:italic;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#remaining{
  margin-top:20px;
  margin-bottom:20px;
  font-size:18px;
  opacity:0.8;
}

.card{
  margin-top:20px;
  padding:30px;
  border-radius:20px;
  background:#222;
  min-height:200px;
}

.type{
  font-size:30px;
  margin-bottom:20px;
  font-weight:bold;
}

.task{
  font-size:24px;
  line-height:1.4;
}

</style>
</head>

<body>

<h1>Wayward</h1>

<p class="subtitle">
A silly game for silly people and Ben
</p>

<button onclick="drawCard()">
Draw Card
</button>

<p id="remaining">
Loading cards...
</p>

<div class="card">

  <div id="type" class="type"></div>

  <div id="task" class="task">
    Press Draw Card
  </div>

</div>

<script>

let cards = [];
let remainingCards = [];

const API_URL = "https://script.google.com/macros/s/AKfycbyChplToswSaLr6B4te3228by7JS-7Ek9DOMri7Bl9c0SVbRyyhVjG_KZLpXjH0aSpc/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {

    cards = data;
    remainingCards = [...cards];

    updateRemainingCount();

    console.log("Loaded", cards.length, "cards");

  })
  .catch(error => {

    console.error(error);

    document.getElementById("remaining").innerText =
      "Failed to load cards";

  });

function updateRemainingCount() {

  document.getElementById("remaining").innerText =
    "Cards Remaining: " + remainingCards.length;

}

function drawCard() {

  if (remainingCards.length === 0) {

    alert("Deck complete! Reshuffling...");

    remainingCards = [...cards];

  }

  const randomIndex =
    Math.floor(Math.random() * remainingCards.length);

  const card =
    remainingCards.splice(randomIndex, 1)[0];

  document.getElementById("type").innerText =
    card.type;

  document.getElementById("task").innerText =
    card.task;

  updateRemainingCount();

}

</script>

</body>
</html>
