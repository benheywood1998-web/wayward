<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Wayward</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

*{
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:#0f1115;
  color:white;
  text-align:center;
  margin:0;
  padding:30px 20px 50px;
}

h1{
  font-size:48px;
  font-weight:800;
  margin:0;
  letter-spacing:-2px;
}

.subtitle{
  margin-top:8px;
  margin-bottom:40px;
  color:#9aa4b2;
  font-size:15px;
}

button{
  background:white;
  color:black;
  border:none;
  border-radius:16px;
  padding:16px 32px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

.card{
  max-width:700px;
  margin:30px auto 15px;
  border-radius:28px;
  padding:35px;
  min-height:320px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.25);
}

.group{
  background:#7c3aed;
}

.individual{
  background:#0f766e;
}

.secret{
  background:#ea580c;
}

.type{
  font-size:15px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.9;
}

.instructions{
  margin-top:8px;
  font-size:14px;
  opacity:0.85;
}

.task{
  font-size:34px;
  font-weight:800;
  line-height:1.25;
  margin-top:30px;
}

#remaining{
  font-size:13px;
  color:#8b949e;
  margin-top:10px;
}

.placeholder{
  color:#d1d5db;
}

</style>
</head>

<body>

<h1>Wayward</h1>

<p class="subtitle">
A silly game for silly people and Ben
</p>

<button onclick="drawCard()">
Draw Card
</button>

<div id="card" class="card">

  <div id="type" class="type"></div>

  <div id="instructions" class="instructions"></div>

  <div id="task" class="task placeholder">
    Press Draw Card
  </div>

</div>

<div id="remaining">
Loading cards...
</div>

<script>

let cards = [];
let remainingCards = [];

const API_URL = "https://script.google.com/macros/s/AKfycbyChplToswSaLr6B4te3228by7JS-7Ek9DOMri7Bl9c0SVbRyyhVjG_KZLpXjH0aSpc/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {

    cards = data;
    remainingCards = [...cards];

    updateRemainingCount();

  })
  .catch(error => {

    console.error(error);

    document.getElementById("remaining").innerText =
      "Failed to load cards";

  });

function updateRemainingCount() {

  document.getElementById("remaining").innerText =
    remainingCards.length + " cards remaining";

}

function drawCard() {

  if (remainingCards.length === 0) {

    alert("Deck complete! Reshuffling...");

    remainingCards = [...cards];

  }

  const randomIndex =
    Math.floor(Math.random() * remainingCards.length);

  const card =
    remainingCards.splice(randomIndex, 1)[0];

  const cardElement =
    document.getElementById("card");

  cardElement.classList.remove(
    "group",
    "individual",
    "secret"
  );

  const type =
    card.type.toLowerCase();

  if (type.includes("group")) {

    cardElement.classList.add("group");

    document.getElementById("type").innerText =
      "GROUP RULE";

    document.getElementById("instructions").innerText =
      "Read this card out loud";

  }

  else if (type.includes("secret")) {

    cardElement.classList.add("secret");

    document.getElementById("type").innerText =
      "SECRET RULE";

    document.getElementById("instructions").innerText =
      "Keep this to yourself";

  }

  else {

    cardElement.classList.add("individual");

    document.getElementById("type").innerText =
      "INDIVIDUAL RULE";

    document.getElementById("instructions").innerText =
      "Read this card out loud";

  }

  document.getElementById("task").innerText =
    card.task;

  document.getElementById("task").classList.remove(
    "placeholder"
  );

  updateRemainingCount();

}

</script>

</body>
</html>
