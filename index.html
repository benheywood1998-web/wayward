<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wayward</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

*{
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:#0f1115;
  color:white;
  text-align:center;
  margin:0;
  padding:24px 16px 40px;
}

h1{
  font-size:44px;
  font-weight:800;
  margin:0;
  letter-spacing:-2px;
}

.subtitle{
  margin-top:8px;
  margin-bottom:28px;
  color:#9aa4b2;
  font-size:13px;
}

button{
  width:100%;
  max-width:420px;
  background:white;
  color:black;
  border:none;
  border-radius:16px;
  padding:16px 24px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

.card{
  max-width:700px;
  margin:24px auto 12px;
  border-radius:28px;
  padding:28px 22px;
  min-height:320px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.group{
  background:#7c3aed;
}

.individual{
  background:#0f766e;
}

.secret{
  background:#ea580c;
}

.type{
  font-size:14px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.95;
}

.instructions{
  margin-top:6px;
  font-size:12px;
  opacity:0.75;
  line-height:1.3;
}

.divider{
  height:1px;
  background:rgba(255,255,255,0.25);
  margin:18px auto 0;
  width:60%;
}

.task{
  font-size:38px;
  font-weight:900;
  line-height:1.2;
  margin-top:22px;
  padding:18px;
  background:rgba(255,255,255,0.12);
  border-radius:18px;
  backdrop-filter:blur(6px);
}

#remaining{
  font-size:12px;
  color:#8b949e;
  margin-top:10px;
}

.placeholder{
  color:#d1d5db;
  background:transparent;
}

@media (max-width: 600px){

  h1{ font-size:36px; }

  .task{ font-size:30px; }

  .card{
    padding:22px 18px;
    min-height:280px;
  }

  button{ font-size:16px; }

}

</style>
</head>

<body>

<h1>Wayward</h1>

<p class="subtitle">
A silly game for silly people and Ben.
</p>

<button onclick="drawCard()">Draw Card</button>

<div id="card" class="card">

  <div id="type" class="type"></div>
  <div id="instructions" class="instructions"></div>

  <div class="divider"></div>

  <div id="task" class="task placeholder">
    Press Draw Card
  </div>

</div>

<div id="remaining">Loading cards...</div>

<script>

let cards = [];
let remainingCards = [];

const API_URL = "https://script.google.com/macros/s/AKfycbyChplToswSaLr6B4te3228by7JS-7Ek9DOMri7Bl9c0SVbRyyhVjG_KZLpXjH0aSpc/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {
    cards = data;
    remainingCards = [...cards];
    updateRemainingCount();
  })
  .catch(error => {
    console.error(error);
    document.getElementById("remaining").innerText = "Failed to load cards";
  });

function updateRemainingCount() {
  document.getElementById("remaining").innerText =
    remainingCards.length + " cards remaining";
}

function drawCard() {

  if (remainingCards.length === 0) {
    alert("Deck complete! Reshuffling...");
    remainingCards = [...cards];
  }

  const randomIndex =
    Math.floor(Math.random() * remainingCards.length);

  const card =
    remainingCards.splice(randomIndex, 1)[0];

  const cardElement =
    document.getElementById("card");

  cardElement.classList.remove("group","individual","secret");

  const type = (card.type || "").toLowerCase();

  // UPDATED MAPPING FOR NEW SPREADSHEET VALUES
  if (type.includes("gang")) {

    cardElement.classList.add("group");

    document.getElementById("type").innerText =
      "GANG RULE";

    document.getElementById("instructions").innerText =
      "Read this out loud. Everyone in the group must complete this task.";

  }

  else if (type.includes("solo")) {

    cardElement.classList.add("individual");

    document.getElementById("type").innerText =
      "SOLO MISSION";

    document.getElementById("instructions").innerText =
      "Read this out loud. Only the reader must complete this task.";

  }

  else if (type.includes("side")) {

    cardElement.classList.add("secret");

    document.getElementById("type").innerText =
      "SIDE QUEST";

    document.getElementById("instructions").innerText =
      "Keep this to yourself. Complete this task whenever you feel the time is right.";

  }

  else {

    // fallback in case spreadsheet has unexpected values
    cardElement.classList.add("individual");

    document.getElementById("type").innerText =
      card.type || "UNKNOWN";

    document.getElementById("instructions").innerText =
      "";
  }

  document.getElementById("task").innerText =
    card.task;

  document.getElementById("task").classList.remove("placeholder");

  updateRemainingCount();
}

</script>

</body>
</html>
